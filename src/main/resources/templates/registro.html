<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Registro | BuildWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<section class="public-hero">

    <nav class="d-flex justify-content-between align-items-center">
        <h3 class="fw-bold text-white">
            <i class="bi bi-cpu-fill"></i>
            BuildWise
        </h3>

        <div class="d-flex gap-3">
            <a href="/publico" class="text-white text-decoration-none">Inicio</a>
            <a href="/login" class="btn btn-primary btn-sm">Iniciar sesión</a>
        </div>
    </nav>

    <div class="hero-card">

        <div>
            <h1>Crea tu cuenta en BuildWise</h1>

            <p>
                Regístrate para usar el armador de PC, ver setups recomendados y cotizar configuraciones según tu presupuesto.
            </p>
        </div>

        <div class="hero-panel">

            <h4 class="mb-4">Registro de usuario</h4>

            <div th:if="${error}" class="alert alert-danger" th:text="${error}"></div>

            <form th:action="@{/registro}" method="post" th:object="${usuario}">

                <div class="mb-3">
                    <label class="form-label text-white">Nombre</label>
                    <input type="text"
                           class="form-control"
                           th:field="*{nombre}"
                           placeholder="Nombre completo"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-white">Correo electrónico</label>
                    <input type="email"
                           class="form-control"
                           th:field="*{correo}"
                           placeholder="ejemplo@correo.com"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label text-white">Contraseña</label>
                    <input type="password"
                           class="form-control"
                           th:field="*{password}"
                           placeholder="Contraseña"
                           required>
                </div>

                <button type="submit" class="btn btn-primary w-100">
                    <i class="bi bi-person-plus"></i>
                    Crear cuenta
                </button>

                <div class="text-center mt-3">
                    <a href="/login" class="text-white">
                        Ya tengo cuenta
                    </a>
                </div>

            </form>

        </div>

    </div>

</section>

</body>
</html>
