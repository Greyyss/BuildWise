<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Proveedores | BuildWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h2 class="logo">
            <i class="bi bi-cpu-fill"></i>
            BuildWise
        </h2>

        <nav>
            <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/componentes"><i class="bi bi-cpu"></i> Componentes</a>
            <a href="/setups"><i class="bi bi-pc-display"></i> Setups</a>
            <a href="/armador"><i class="bi bi-tools"></i> Armador de PC</a>
            <a href="/cotizaciones"><i class="bi bi-receipt"></i> Cotizaciones</a>
            <a href="/categorias"><i class="bi bi-tags"></i> Categorías</a>
            <a href="/proveedores"><i class="bi bi-truck"></i> Proveedores</a>
            <a href="/usuarios"><i class="bi bi-people"></i> Usuarios</a>
            <a href="/solicitudes"><i class="bi bi-file-earmark-text"></i> Solicitudes</a>
            <a href="/logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
        </nav>
    </aside>

    <main class="main">

        <div class="topbar">
            <div>
                <h3>Proveedores</h3>
                <span>Gestión de proveedores de componentes tecnológicos</span>
            </div>

            <a href="/proveedores/crear" class="btn btn-primary">
                <i class="bi bi-plus-circle"></i>
                Nuevo proveedor
            </a>
        </div>

        <div class="table-box">

            <table class="table table-hover align-middle">

                <thead>
                <tr>
                    <th>ID</th>
                    <th>Nombre</th>
                    <th>Teléfono</th>
                    <th>Correo</th>
                    <th>Dirección</th>
                    <th>Estado</th>
                    <th>Acciones</th>
                </tr>
                </thead>

                <tbody>

                <tr th:each="proveedor : ${proveedores}">
                    <td th:text="${proveedor.id}"></td>
                    <td th:text="${proveedor.nombre}"></td>
                    <td th:text="${proveedor.telefono}"></td>
                    <td th:text="${proveedor.correo}"></td>
                    <td th:text="${proveedor.direccion}"></td>

                    <td>
                        <span class="badge bg-success" th:text="${proveedor.estado}"></span>
                    </td>

                    <td>
                        <a th:href="@{/proveedores/editar/{id}(id=${proveedor.id})}"
                           class="btn btn-warning btn-sm">
                            <i class="bi bi-pencil"></i>
                        </a>

                        <a th:href="@{/proveedores/eliminar/{id}(id=${proveedor.id})}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Seguro que desea eliminar este proveedor?')">
                            <i class="bi bi-trash"></i>
                        </a>
                    </td>
                </tr>

                </tbody>

            </table>

        </div>

    </main>

</div>

</body>
</html>
