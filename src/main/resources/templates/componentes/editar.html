<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Editar Componente | BuildWise</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h2 class="logo"><i class="bi bi-cpu-fill"></i> BuildWise</h2>

        <nav>
            <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/componentes"><i class="bi bi-cpu"></i> Componentes</a>
            <a href="/categorias"><i class="bi bi-tags"></i> Categorías</a>
            <a href="/proveedores"><i class="bi bi-truck"></i> Proveedores</a>
            <a href="/usuarios"><i class="bi bi-people"></i> Usuarios</a>
            <a href="/solicitudes"><i class="bi bi-file-earmark-text"></i> Solicitudes</a>
            <a href="/logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
        </nav>
    </aside>

    <main class="main">

        <div class="topbar">
            <div>
                <h3>Editar componente</h3>
                <span>Actualizar información del componente</span>
            </div>
        </div>

        <div class="table-box">

            <form th:action="@{/componentes/guardar}" method="post" th:object="${componente}">

                <input type="hidden" th:field="*{id}">
                <input type="hidden" th:field="*{estado}">

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Nombre</label>
                        <input type="text" class="form-control" th:field="*{nombre}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Marca</label>
                        <input type="text" class="form-control" th:field="*{marca}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Modelo</label>
                        <input type="text" class="form-control" th:field="*{modelo}">
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Precio</label>
                        <input type="number" step="0.01" min="0" class="form-control" th:field="*{precio}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Stock</label>
                        <input type="number" min="0" class="form-control" th:field="*{stock}" required>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Categoría</label>
                        <select class="form-select" th:field="*{categoria}" required>
                            <option value="">Seleccione una categoría</option>
                            <option th:each="categoria : ${categorias}"
                                    th:value="${categoria.id}"
                                    th:text="${categoria.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Proveedor</label>
                        <select class="form-select" th:field="*{proveedor}" required>
                            <option value="">Seleccione un proveedor</option>
                            <option th:each="proveedor : ${proveedores}"
                                    th:value="${proveedor.id}"
                                    th:text="${proveedor.nombre}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-12 mb-3">
                        <label class="form-label">Descripción</label>
                        <textarea class="form-control" rows="4" th:field="*{descripcion}"></textarea>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-arrow-repeat"></i> Actualizar
                </button>

                <a href="/componentes" class="btn btn-secondary">Cancelar</a>

            </form>

        </div>

    </main>

</div>

</body>
</html>
