<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Armar mi PC | BuildWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="layout">

    <aside class="sidebar">
        <h2 class="logo">
            <i class="bi bi-cpu-fill"></i>
            BuildWise
        </h2>

        <nav>
            <a href="/publico"><i class="bi bi-house"></i> Inicio</a>
            <a href="/armador"><i class="bi bi-tools"></i> Armador automático</a>
            <a href="/armador/manual"><i class="bi bi-pc-display-horizontal"></i> Armar mi PC</a>
            <a href="/stock"><i class="bi bi-box-seam"></i> Componentes en stock</a>
            <a href="/publico#cotizacion"><i class="bi bi-send"></i> Solicitar cotización</a>

            <a href="/dashboard" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-speedometer2"></i> Dashboard
            </a>

            <a href="/componentes" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-cpu"></i> Componentes admin
            </a>

            <a href="/setups" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-pc-display"></i> Setups admin
            </a>

            <a href="/cotizaciones" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-receipt"></i> Cotizaciones
            </a>

            <a href="/categorias" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-tags"></i> Categorías
            </a>

            <a href="/proveedores" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-truck"></i> Proveedores
            </a>

            <a href="/usuarios" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-people"></i> Usuarios
            </a>

            <a href="/solicitudes" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-file-earmark-text"></i> Solicitudes
            </a>

            <a href="/reportes" th:if="${rol == 'ADMIN'}">
                <i class="bi bi-bar-chart"></i> Reportes
            </a>

            <a href="/logout">
                <i class="bi bi-box-arrow-right"></i> Cerrar sesión
            </a>
        </nav>
    </aside>

    <main class="main">

        <div class="topbar">
            <div>
                <h3>Armar mi PC</h3>
                <span>Seleccione los componentes según su presupuesto y necesidad</span>
            </div>
        </div>

        <div class="table-box">

            <form th:action="@{/armador/manual/calcular}" method="post">

                <div class="mb-4">
                    <label class="form-label">Presupuesto disponible</label>
                    <input type="number"
                           name="presupuesto"
                           class="form-control"
                           placeholder="Ejemplo: 500000"
                           min="1"
                           required>
                </div>

                <div class="row">

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Procesador</label>
                        <select name="procesadorId" class="form-select" required>
                            <option value="">Seleccione procesador</option>
                            <option th:each="c : ${procesadores}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre + ' - ₡' + c.precio}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tarjeta madre</label>
                        <select name="tarjetaMadreId" class="form-select" required>
                            <option value="">Seleccione tarjeta madre</option>
                            <option th:each="c : ${tarjetasMadre}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre + ' - ₡' + c.precio}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Memoria RAM</label>
                        <select name="memoriaId" class="form-select" required>
                            <option value="">Seleccione memoria RAM</option>
                            <option th:each="c : ${memorias}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre + ' - ₡' + c.precio}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Almacenamiento</label>
                        <select name="almacenamientoId" class="form-select" required>
                            <option value="">Seleccione almacenamiento</option>
                            <option th:each="c : ${almacenamientos}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre + ' - ₡' + c.precio}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Fuente de poder</label>
                        <select name="fuenteId" class="form-select" required>
                            <option value="">Seleccione fuente</option>
                            <option th:each="c : ${fuentes}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre + ' - ₡' + c.precio}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Tarjeta gráfica</label>
                        <select name="graficaId" class="form-select">
                            <option value="">Sin tarjeta gráfica dedicada</option>
                            <option th:each="c : ${graficas}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre + ' - ₡' + c.precio}">
                            </option>
                        </select>
                    </div>

                    <div class="col-md-6 mb-3">
                        <label class="form-label">Gabinete</label>
                        <select name="gabineteId" class="form-select">
                            <option value="">Sin gabinete seleccionado</option>
                            <option th:each="c : ${gabinetes}"
                                    th:value="${c.id}"
                                    th:text="${c.nombre + ' - ₡' + c.precio}">
                            </option>
                        </select>
                    </div>

                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-calculator"></i>
                    Calcular mi PC
                </button>

                <a href="/armador" class="btn btn-secondary">
                    Volver
                </a>

            </form>

        </div>

    </main>

</div>

</body>
</html>
