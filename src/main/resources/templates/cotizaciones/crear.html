<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Nueva Cotización | BuildWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h2 class="logo">
            <i class="bi bi-cpu-fill"></i>
            BuildWise
        </h2>

        <nav>
            <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>
            <a href="/componentes"><i class="bi bi-cpu"></i> Componentes</a>
            <a href="/setups"><i class="bi bi-pc-display"></i> Setups</a>
            <a href="/armador"><i class="bi bi-tools"></i> Armador de PC</a>
            <a href="/cotizaciones"><i class="bi bi-receipt"></i> Cotizaciones</a>
            <a href="/categorias"><i class="bi bi-tags"></i> Categorías</a>
            <a href="/proveedores"><i class="bi bi-truck"></i> Proveedores</a>
            <a href="/usuarios"><i class="bi bi-people"></i> Usuarios</a>
            <a href="/solicitudes"><i class="bi bi-file-earmark-text"></i> Solicitudes</a>
            <a href="/reportes"><i class="bi bi-bar-chart"></i> Reportes</a>
            <a href="/logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>
        </nav>

    </aside>

    <main class="main">

        <div class="topbar">
            <div>
                <h3>Nueva Cotización</h3>
                <span>Registrar una cotización manual</span>
            </div>

            <a href="/cotizaciones" class="btn btn-secondary">
                <i class="bi bi-arrow-left"></i>
                Volver
            </a>
        </div>

        <div class="table-box">

            <form action="/cotizaciones/guardar" method="post">

                <div class="mb-3">
                    <label class="form-label">Cliente</label>
                    <input type="text"
                           name="cliente"
                           class="form-control"
                           placeholder="Nombre del cliente"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Tipo de uso</label>

                    <select name="tipoUso" class="form-select" required>
                        <option value="">Seleccione una opción</option>
                        <option value="GAMING">Gaming</option>
                        <option value="ESTUDIO">Estudio</option>
                        <option value="OFICINA">Oficina</option>
                        <option value="DISEÑO">Diseño / Edición</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label class="form-label">Presupuesto</label>
                    <input type="number"
                           step="0.01"
                           name="presupuesto"
                           class="form-control"
                           placeholder="Ejemplo: 500000"
                           required>
                </div>

                <div class="mb-3">
                    <label class="form-label">Total cotizado</label>
                    <input type="number"
                           step="0.01"
                           name="total"
                           class="form-control"
                           placeholder="Ejemplo: 475000"
                           required>
                </div>

                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-save"></i>
                    Guardar cotización
                </button>

                <a href="/cotizaciones" class="btn btn-secondary">
                    Cancelar
                </a>

            </form>

        </div>

    </main>

</div>

</body>
</html>
