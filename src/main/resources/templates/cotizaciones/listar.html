<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <title>Cotizaciones | BuildWise</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="layout">

    <aside class="sidebar">

        <h2 class="logo">
            <i class="bi bi-cpu-fill"></i>
            BuildWise
        </h2>

        <nav>

            <a href="/dashboard"><i class="bi bi-speedometer2"></i> Dashboard</a>

            <a href="/componentes"><i class="bi bi-cpu"></i> Componentes</a>

            <a href="/setups"><i class="bi bi-pc-display"></i> Setups</a>

            <a href="/armador"><i class="bi bi-tools"></i> Armador de PC</a>

            <a href="/cotizaciones"><i class="bi bi-receipt"></i> Cotizaciones</a>

            <a href="/categorias"><i class="bi bi-tags"></i> Categorías</a>

            <a href="/proveedores"><i class="bi bi-truck"></i> Proveedores</a>

            <a href="/usuarios"><i class="bi bi-people"></i> Usuarios</a>

            <a href="/logout"><i class="bi bi-box-arrow-right"></i> Cerrar sesión</a>

        </nav>

    </aside>

    <main class="main">

        <div class="topbar">

            <div>

                <h3>Cotizaciones</h3>

                <span>Administración de cotizaciones</span>

            </div>

            <a href="/cotizaciones/crear" class="btn btn-primary">

                <i class="bi bi-plus-circle"></i>

                Nueva cotización

            </a>

        </div>

        <div class="table-box">

            <table class="table table-hover">

                <thead>

                <tr>

                    <th>ID</th>

                    <th>Cliente</th>

                    <th>Uso</th>

                    <th>Presupuesto</th>

                    <th>Total</th>

                    <th>Fecha</th>

                    <th>Estado</th>

                    <th>Acciones</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="cotizacion : ${cotizaciones}">

                    <td th:text="${cotizacion.id}"></td>

                    <td th:text="${cotizacion.cliente}"></td>

                    <td th:text="${cotizacion.tipoUso}"></td>

                    <td th:text="'₡'+${cotizacion.presupuesto}"></td>

                    <td th:text="'₡'+${cotizacion.total}"></td>

                    <td th:text="${cotizacion.fecha}"></td>

                    <td>

                        <span class="badge bg-success"
                              th:text="${cotizacion.estado}">
                        </span>

                    </td>

                    <td>

                        <a class="btn btn-danger btn-sm"
                           th:href="@{/cotizaciones/eliminar/{id}(id=${cotizacion.id})}">

                            <i class="bi bi-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </main>

</div>

</body>

</html>
